<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AE Proposed Peaker Sites — Verify</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
  #header { background: #1a4731; color: white; padding: 12px 16px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 15px; font-weight: 600; }
  #header p  { font-size: 12px; opacity: 0.75; }
  #map { flex: 1; }
  #sidebar { position: absolute; top: 56px; right: 12px; z-index: 1000; background: white;
             border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); width: 220px;
             max-height: calc(100vh - 80px); overflow-y: auto; }
  #sidebar h2 { font-size: 12px; font-weight: 600; padding: 10px 12px; border-bottom: 1px solid #e5e7eb;
                background: #f9fafb; border-radius: 8px 8px 0 0; }
  .site-row { padding: 7px 12px; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
  .site-row:hover { background: #f0fdf4; }
  .site-row .num { display: inline-block; background: #ea7c2b; color: white; border-radius: 50%;
                   width: 20px; height: 20px; text-align: center; line-height: 20px;
                   font-size: 11px; font-weight: 700; margin-right: 6px; }
  .site-row .coords { font-size: 10px; color: #6b7280; font-family: monospace; }
  .note { padding: 8px 12px; font-size: 10px; color: #9ca3af; border-top: 1px solid #e5e7eb; }
</style>
</head>
<body>
<div id="header">
  <div>
    <h1>Austin Energy — Phase III Shortlisted Peaker Sites</h1>
    <p>Coordinates estimated from image · accuracy ±2–5 miles · click markers to inspect</p>
  </div>
</div>
<div id="map"></div>
<div id="sidebar">
  <h2>14 Sites</h2>
  <div id="site-list"></div>
  <div class="note">Coordinates are estimates. Drag markers to correct positions, then copy updated coords from the console.</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SITES = [
  { id:  1, lat: 30.46406, lng: -97.73575 },
  { id:  2, lat: 30.44333, lng: -97.71652 },
  { id:  3, lat: 30.41495, lng: -97.84012 },
  { id:  4, lat: 30.40429, lng: -97.81540 },
  { id:  5, lat: 30.23422, lng: -97.87514 },
  { id:  6, lat: 30.29878, lng: -97.59499 },
  { id:  7, lat: 30.19913, lng: -97.61009 },
  { id:  8, lat: 30.17486, lng: -97.76596 },
  { id:  9, lat: 30.16059, lng: -97.66914 },
  { id: 10, lat: 30.14870, lng: -97.61765 },
  { id: 11, lat: 30.36161, lng: -97.63618 },
  { id: 12, lat: 30.24957, lng: -97.66296 },
  { id: 13, lat: 30.24895, lng: -97.51808 },
  { id: 14, lat: 30.13090, lng: -97.65129 },
];

const map = L.map('map').setView([30.28, -97.74], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 18,
}).addTo(map);

function makeIcon(num) {
  return L.divIcon({
    className: '',
    html: `<div style="background:#ea7c2b;color:white;border-radius:50%;width:28px;height:28px;
                display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
                border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4)">${num}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
  });
}

const markers = {};
const updated = {};

SITES.forEach(s => {
  updated[s.id] = { lat: s.lat, lng: s.lng };
  const m = L.marker([s.lat, s.lng], { icon: makeIcon(s.id), draggable: true }).addTo(map);
  m.bindPopup(`<b>Site ${s.id}</b><br>${s.lat.toFixed(4)}°N, ${s.lng.toFixed(4)}°W`);
  m.on('dragend', e => {
    const { lat, lng } = e.target.getLatLng();
    updated[s.id] = { lat: +lat.toFixed(5), lng: +lng.toFixed(5) };
    e.target.setPopupContent(`<b>Site ${s.id}</b><br>${lat.toFixed(4)}°N, ${lng.toFixed(4)}°W`);
    refreshList();
    console.log('Updated SITES:', JSON.stringify(Object.entries(updated).map(([id,c])=>({id:+id,...c})), null, 2));
  });
  markers[s.id] = m;
});

function refreshList() {
  const list = document.getElementById('site-list');
  list.innerHTML = SITES.map(s => {
    const c = updated[s.id];
    return `<div class="site-row" onclick="markers[${s.id}].openPopup();map.panTo([${c.lat},${c.lng}])">
      <span class="num">${s.id}</span>
      <span class="coords">${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}</span>
    </div>`;
  }).join('');
}
refreshList();
</script>
</body>
</html>
